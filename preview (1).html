<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ALTIVO OPTICS | Próximamente</title>
  <meta name="description" content="Se aproxima algo nuevo en el mundo de los lentes de deporte. ALTIVO OPTICS, muy pronto." />
  <meta name="theme-color" content="#000000" />
  <style>
    :root {
      --bg: #050505;
      --panel: rgba(255,255,255,0.04);
      --text: #f5f5f5;
      --muted: #bdbdbd;
      --accent: #ff6f1a;
      --line: rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(255,111,26,0.18), transparent 22%),
        radial-gradient(circle at bottom left, rgba(255,255,255,0.08), transparent 20%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(100%, 860px);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border-radius: 28px;
      padding: 44px 32px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 30px 60px rgba(0,0,0,0.35);
    }
    .eyebrow {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,111,26,0.28);
      background: rgba(255,111,26,0.10);
      color: #ffb082;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 800;
    }
    p {
      margin: 0 auto;
      max-width: 660px;
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.6;
      color: var(--muted);
    }
    .highlight {
      color: var(--text);
    }
    .divider {
      width: 88px;
      height: 3px;
      background: var(--accent);
      border-radius: 999px;
      margin: 26px auto 22px;
    }
    .footer {
      margin-top: 18px;
      font-size: 0.95rem;
      color: #d5d5d5;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .small {
      margin-top: 18px;
      font-size: 0.92rem;
      color: #9d9d9d;
    }
    @media (max-width: 640px) {
      .card { padding: 34px 22px; border-radius: 22px; }
      .footer { letter-spacing: 0.06em; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">ALTIVO OPTICS · Próximamente</div>
    <h1>Se aproxima algo nuevo</h1>
    <p>
      En <span class="highlight">el mundo de los lentes de deporte</span>.
      <br />
      ALTIVO OPTICS llegará con una propuesta de rendimiento, protección visual y diseño con carácter.
    </p>
    <div class="divider"></div>
    <div class="footer">Muy pronto</div>
    <div class="small">República Dominicana</div>
  </main>
</body>
</html>
